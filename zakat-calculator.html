    <div class="container">
        <h1 class="page-title">💰 Zakat Calculator</h1>

        <div class="calculator-card">
            <h2>Calculate Your Zakat</h2>

            <!-- CURRENCY SELECTOR -->
            <div class="currency-section">
                <label for="currencySelect">Select Currency</label>
                <select id="currencySelect" onchange="updateCurrency()">
                    <option value="">Choose your currency...</option>
                </select>
            </div>

            <!-- ASSETS INPUT -->
            <div class="input-group">
                <label>Cash & Bank Accounts</label>
                <div class="input-wrapper">
                    <span class="currency-symbol" id="symbol1">$</span>
                    <input type="number" id="cash" placeholder="0" min="0" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label>Gold & Silver (Current Value)</label>
                <div class="input-wrapper">
                    <span class="currency-symbol" id="symbol2">$</span>
                    <input type="number" id="gold" placeholder="0" min="0" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label>Business Assets & Stock</label>
                <div class="input-wrapper">
                    <span class="currency-symbol" id="symbol3">$</span>
                    <input type="number" id="business" placeholder="0" min="0" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label>Investments & Shares</label>
                <div class="input-wrapper">
                    <span class="currency-symbol" id="symbol4">$</span>
                    <input type="number" id="investments" placeholder="0" min="0" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label>Other Assets</label>
                <div class="input-wrapper">
                    <span class="currency-symbol" id="symbol5">$</span>
                    <input type="number" id="other" placeholder="0" min="0" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label>Debts/Liabilities (Deduct)</label>
                <div class="input-wrapper">
                    <span class="currency-symbol" id="symbol6">$</span>
                    <input type="number" id="liabilities" placeholder="0" min="0" step="0.01">
                </div>
            </div>

            <button class="calculate-btn" onclick="calculateZakat()">Calculate Zakat</button>
        </div>

        <!-- RESULT -->
        <div class="result-card" id="resultCard">
            <h3>Your Zakat Amount</h3>
            <div class="zakat-amount" id="zakatAmount"></div>
            <div class="result-details">
                <p><strong>Total Zakatable Wealth:</strong> <span id="totalWealth"></span></p>
                <p><strong>Zakat Rate:</strong> 2.5%</p>
            </div>
        </div>
    </div>

    <footer>
