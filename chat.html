<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Islamic Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 350px;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            color: #111827;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .search-box {
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 0.95rem;
            background: #f3f4f6;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .chat-tabs {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 1rem;
        }

        .chat-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            color: #6b7280;
            transition: all 0.3s;
        }

        .chat-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 1rem 1.5rem;
            display: flex;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid #f3f4f6;
        }

        .chat-item:hover {
            background: #f9fafb;
        }

        .chat-item.active {
            background: #ede9fe;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            color: #111827;
            margin-bottom: 0.3rem;
        }

        .chat-last-message {
            color: #6b7280;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            color: #9ca3af;
            font-size: 0.75rem;
        }

        .unread-badge {
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* MAIN CHAT AREA */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f9fafb;
        }

        .chat-header {
            padding: 1.5rem;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #111827;
        }

        .chat-header-status {
            color: #10b981;
            font-size: 0.85rem;
        }

        .chat-options {
            display: flex;
            gap: 0.5rem;
        }

        .option-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f3f4f6;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .option-btn:hover {
            background: #e5e7eb;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.8rem;
            max-width: 70%;
        }

        .message.own {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .message-bubble {
            padding: 0.8rem 1rem;
            border-radius: 18px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-sender {
            font-size: 0.75rem;
            color: #6b7280;
            font-weight: 600;
            padding: 0 0.5rem;
        }

        .message-time {
            font-size: 0.7rem;
            color: #9ca3af;
            padding: 0 0.5rem;
        }

        .message-input-container {
            padding: 1rem 1.5rem;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: 1px solid #e5e7eb;
            border-radius: 25px;
            font-size: 0.95rem;
            background: #f3f4f6;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .empty-state-text {
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            font-size: 1.5rem;
            color: #111827;
        }

        .modal-close {
            font-size: 1.8rem;
            cursor: pointer;
            color: #6b7280;
        }

        .modal-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .modal-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .user-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        .user-item {
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .user-item:hover {
            background: #f3f4f6;
        }

        .user-item.selected {
            background: #ede9fe;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        @media (max-width: 968px) {
            .sidebar {
                width: 100%;
                position: absolute;
                left: 0;
                z-index: 100;
                transition: transform 0.3s;
            }

            .sidebar.hidden {
                transform: translateX(-100%);
            }

            .chat-main {
                width: 100%;
            }

            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>💬 Messages</h2>
                <button class="new-chat-btn" onclick="openNewChatModal()">+ New</button>
            </div>

            <div class="search-box">
                <input type="text" placeholder="🔍 Search chats..." id="searchInput" onkeyup="searchChats()">
            </div>

            <div class="chat-tabs">
                <div class="chat-tab active" onclick="switchTab('all')">All</div>
                <div class="chat-tab" onclick="switchTab('groups')">Groups</div>
            </div>

            <div class="chat-list" id="chatList">
                <!-- Chats will be loaded here -->
            </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="chat-main" id="chatMain">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <div class="empty-state-text">Select a chat to start messaging</div>
            </div>
        </div>
    </div>

    <!-- NEW CHAT MODAL -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Chat</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <input type="text" class="modal-input" id="chatTypeInput" placeholder="Enter chat type (direct/group)">
            <input type="text" class="modal-input" id="chatNameInput" placeholder="Enter username or group name">
            <button class="modal-btn" onclick="createNewChat()">Start Chat</button>
        </div>
    </div>

    <!-- NEW GROUP MODAL -->
    <div class="modal" id="newGroupModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create Group</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <input type="text" class="modal-input" id="groupNameInput" placeholder="Group name">
            <div class="user-list" id="userList">
                <!-- Users will be loaded here -->
            </div>
            <button class="modal-btn" onclick="createGroup()">Create Group</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDqVwW8YMxW_2fJ5dOmJKxH2JKl_9mHs9I",
            authDomain: "islamic-hub-chat.firebaseapp.com",
            databaseURL: "https://islamic-hub-chat-default-rtdb.firebaseio.com",
            projectId: "islamic-hub-chat",
            storageBucket: "islamic-hub-chat.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // User data
        let currentUser = {
            id: 'user_' + Math.random().toString(36).substr(2, 9),
            name: localStorage.getItem('islamicHubUsername') || 'Anonymous',
            avatar: '👤'
        };

        // Current chat
        let currentChatId = null;
        let currentChatType = null;
        let allChats = [];

        // Initialize
        window.onload = function() {
            // Ask for username if not set
            if (!localStorage.getItem('islamicHubUsername')) {
                const username = prompt('Enter your name:') || 'Anonymous';
                localStorage.setItem('islamicHubUsername', username);
                currentUser.name = username;
            }

            loadChats();
        };

        // Load all chats
        function loadChats() {
            database.ref('chats').on('value', snapshot => {
                allChats = [];
                const chatList = document.getElementById('chatList');
                chatList.innerHTML = '';

                snapshot.forEach(child => {
                    const chat = child.val();
                    chat.id = child.key;
                    allChats.push(chat);
                });

                // Sort by last message time
                allChats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));

                // Display chats
                allChats.forEach(chat => {
                    displayChatItem(chat);
                });

                if (allChats.length === 0) {
                    chatList.innerHTML = '<div style="text-align: center; padding: 2rem; color: #9ca3af;">No chats yet. Start a new chat!</div>';
                }
            });
        }

        // Display chat item in sidebar
        function displayChatItem(chat) {
            const chatList = document.getElementById('chatList');
            
            const chatDiv = document.createElement('div');
            chatDiv.className = 'chat-item';
            if (currentChatId === chat.id) chatDiv.classList.add('active');
            chatDiv.onclick = () => openChat(chat.id);

            const avatar = chat.type === 'group' ? '👥' : '👤';
            const name = chat.name || 'Unknown';
            const lastMsg = chat.lastMessage || 'No messages yet';

            chatDiv.innerHTML = `
                <div class="chat-avatar">${avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${name}</div>
                    <div class="chat-last-message">${lastMsg}</div>
                </div>
                <div>
                    <div class="chat-time">${getTimeAgo(chat.lastMessageTime)}</div>
                </div>
            `;

            chatList.appendChild(chatDiv);
        }

        // Open chat
        function openChat(chatId) {
            currentChatId = chatId;
            const chat = allChats.find(c => c.id === chatId);
            currentChatType = chat.type;

            // Update UI
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.chat-item').classList.add('active');

            // Build chat UI
            const chatMain = document.getElementById('chatMain');
            chatMain.innerHTML = `
                <div class="chat-header">
                    <div class="chat-avatar">${chat.type === 'group' ? '👥' : '👤'}</div>
                    <div class="chat-header-info">
                        <div class="chat-header-name">${chat.name}</div>
                        <div class="chat-header-status">${chat.type === 'group' ? chat.members?.length + ' members' : 'Online'}</div>
                    </div>
                    <div class="chat-options">
                        <button class="option-btn" title="Info">ℹ️</button>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will be loaded here -->
                </div>
                <div class="message-input-container">
                    <input type="text" class="message-input" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">📤</button>
                </div>
            `;

            // Load messages
            loadMessages(chatId);

            // Hide sidebar on mobile
            if (window.innerWidth <= 968) {
                document.getElementById('sidebar').classList.add('hidden');
            }
        }

        // Load messages
        function loadMessages(chatId) {
            database.ref(`messages/${chatId}`).on('value', snapshot => {
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';

                snapshot.forEach(child => {
                    const msg = child.val();
                    displayMessage(msg);
                });

                // Scroll to bottom
                container.scrollTop = container.scrollHeight;
            });
        }

        // Display message
        function displayMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const isOwn = msg.senderId === currentUser.id;

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOwn ? 'own' : ''}`;

            msgDiv.innerHTML = `
                <div class="message-avatar">${msg.senderAvatar || '👤'}</div>
                <div class="message-content">
                    ${!isOwn && currentChatType === 'group' ? `<div class="message-sender">${msg.senderName}</div>` : ''}
                    <div class="message-bubble">${msg.text}</div>
                    <div class="message-time">${getTimeAgo(msg.timestamp)}</div>
                </div>
            `;

            container.appendChild(msgDiv);
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text || !currentChatId) return;

            const message = {
                senderId: currentUser.id,
                senderName: currentUser.name,
                senderAvatar: currentUser.avatar,
                text: text,
                timestamp: Date.now()
            };

            // Save message
            database.ref(`messages/${currentChatId}`).push(message);

            // Update last message in chat
            database.ref(`chats/${currentChatId}`).update({
                lastMessage: text,
                lastMessageTime: Date.now()
            });

            input.value = '';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        // New chat modal
        function openNewChatModal() {
            document.getElementById('newChatModal').classList.add('active');
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        // Create new chat
        function createNewChat() {
            const type = document.getElementById('chatTypeInput').value.trim().toLowerCase();
            const name = document.getElementById('chatNameInput').value.trim();

            if (!name) {
                alert('Please enter a name!');
                return;
            }

            if (type === 'group') {
                // Open group creation modal
                closeModal();
                document.getElementById('groupNameInput').value = name;
                document.getElementById('newGroupModal').classList.add('active');
                loadUsersForGroup();
            } else {
                // Create direct chat
                const chatId = 'chat_' + Date.now();
                database.ref(`chats/${chatId}`).set({
                    type: 'direct',
                    name: name,
                    members: [currentUser.id],
                    createdBy: currentUser.id,
                    createdAt: Date.now(),
                    lastMessage: '',
                    lastMessageTime: Date.now()
                });

                closeModal();
                alert('Chat created! You can now send messages.');
            }
        }

        // Load users for group
        function loadUsersForGroup() {
            const userList = document.getElementById('userList');
            userList.innerHTML = `
                <div class="user-item">
                    <input type="checkbox" class="checkbox" value="user1">
                    <div class="chat-avatar">👤</div>
                    <div>Ahmad123</div>
                </div>
                <div class="user-item">
                    <input type="checkbox" class="checkbox" value="user2">
                    <div class="chat-avatar">👤</div>
                    <div>Fatima786</div>
                </div>
                <div class="user-item">
                    <input type="checkbox" class="checkbox" value="user3">
                    <div class="chat-avatar">👤</div>
                    <div>Abdullah99</div>
                </div>
            `;
        }

        // Create group
        function createGroup() {
            const groupName = document.getElementById('groupNameInput').value.trim();
            
            if (!groupName) {
                alert('Please enter a group name!');
                return;
            }

            const selectedUsers = [];
            document.querySelectorAll('#userList .checkbox:checked').forEach(cb => {
                selectedUsers.push(cb.value);
            });

            selectedUsers.push(currentUser.id);

            const chatId = 'group_' + Date.now();
            database.ref(`chats/${chatId}`).set({
                type: 'group',
                name: groupName,
                members: selectedUsers,
                createdBy: currentUser.id,
                createdAt: Date.now(),
                lastMessage: '',
                lastMessageTime: Date.now()
            });

            closeModal();
            alert('Group created! Start chatting with your group.');
        }

        // Search chats
        function searchChats() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.chat-item').forEach(item => {
                const name = item.querySelector('.chat-name').textContent.toLowerCase();
                item.style.display = name.includes(search) ? 'flex' : 'none';
            });
        }

        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'groups') {
                document.querySelectorAll('.chat-item').forEach(item => {
                    const avatar = item.querySelector('.chat-avatar').textContent;
                    item.style.display = avatar === '👥' ? 'flex' : 'none';
                });
            } else {
                document.querySelectorAll('.chat-item').forEach(item => {
                    item.style.display = 'flex';
                });
            }
        }

        // Get time ago
        function getTimeAgo(timestamp) {
            if (!timestamp) return '';
            
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h';
            if (seconds < 604800) return Math.floor(seconds / 86400) + 'd';
            return new Date(timestamp).toLocaleDateString();
        }
    </script>
</body>
</html>
